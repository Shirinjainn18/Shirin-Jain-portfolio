<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS Date Diary</title>
    <link href="https://fonts.googleapis.com/css2?family=Just+Me+Again+Down+Here&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="design.css">

</head>
<body>

    <header>
        <div class="header-div">

            <div class="header-item active">
                <a href="index.html">home</a>
            </div>

            <div class="header-item">
                <a href="checklist.html">checklist</a>
            </div>

            <div class="header-item">
                <a href="datediaries.html">date diaries</a>
            </div>

        </div>
    </header>


    <section class="hero-sec">

        <div class="hero-div">

            <div class="hero-img"><img src="imgs/shailletter.webp" alt=""></div>

            <h1 class="h1">shail & shirin </h1>

            <h2 class="hero-h2">For every date we dreamed of, and every memory we’re yet to create</h2>

            <div class="hero-btn">
                <button type="button" id="openCreateDate">create date</button>
            </div>

        </div>

    </section>




<section class="memories">

  <div class="memories-div">

    <div class="memory-heading">
      <h2>memory wall</h2>
    </div>

    <div class="all-memories" id="memoryWall"></div>

  </div>

</section>

<section class="checklist">

  <div class="checklist-div">

    <div class="checklist-heading">
      <h2>date checklist</h2>
    </div>

    <div class="checklist-content">

      <div class="checklist-textimg">
        <div class="checklist-text">
          <div>
            <h3>Below is the date checklist:</h3>
          </div>

          <div>
            <ul id="homeChecklistList"></ul>
          </div>
        </div>

        <div class="checklist-img">
          <img src="imgs/date5.jpeg" alt="">
        </div>
      </div>

      <button class="checklist-btn">
        <a href="checklist.html">See all dates</a>
      </button>

    </div>

  </div>

</section>


    <section class="footer-sec">

        <div class="footer-div">

            <div class="sticker"><img src="imgs/flower.png" alt=""></div>

            <div class="gdp-img"><img src="imgs/sh.jpg" alt=""></div>

            <h1 class="h1">shail & shirin </h1>

            <h2 class="hero-h2">28/3/26</h2>

        </div>
        
    </section>

    <div class="modal-overlay" id="createDateModal">
    <div class="modal-box create-date-box">
        <h3>Create Date</h3>

        <input type="text" id="dateTitleInput" placeholder="Name">

        <div class="modal-actions">
            <button type="button" id="saveDateBtn">SAVE</button>
            <button type="button" id="cancelCreateDateBtn">CANCEL</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
